name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

      - name: go test
        run: go test ./...

      - name: go build (native)
        run: go build ./...

      - name: go build (wasm)
        run: GOOS=js GOARCH=wasm go build -o /tmp/hopreach.wasm ./wasm

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check public/*.js
        run: |
          for f in public/*.js; do
            echo "checking $f"
            node --check "$f"
          done

  # End-to-end tests (tests/*.spec.js, see playwright.config.js) against a
  # real running container — the same image users actually deploy, not a
  # dev-only shortcut. Deliberately doesn't wait for a full coverage
  # compute pass (see playwright.config.js's own comment); repeaters.geojson
  # populating from the real CoreScope fetch is enough for the client-side
  # tools (planning, simulator) these tests exercise.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build hopreach:latest
        run: docker compose build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
